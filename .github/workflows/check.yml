on: [push, pull_request]
name: Run checks and build

jobs:
  lint:
    name: Lint (clippy & rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev gcc-mingw-w64

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  build:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev gcc-mingw-w64

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-pc-windows-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build for Linux
        run: cargo build --release --target x86_64-unknown-linux-gnu --bin mint-tea

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: mint-tea-linux
          path: target/x86_64-unknown-linux-gnu/release/mint-tea

      - name: Build for Windows
        run: cargo build --release --target x86_64-pc-windows-gnu --bin mint-tea

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mint-tea-windows
          path: target/x86_64-pc-windows-gnu/release/mint-tea.exe
